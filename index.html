<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script type="text/javascript" src="title.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2ee;
      --surface:   #ffffff;
      --ink:       #1a1714;
      --muted:     #7a746d;
      --accent:    #b8860b;
      --border:    #e0dad2;
      --radius:    4px;
      --gap:       20px;
      --col:       320px;
      --font-disp: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --ease:      cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    .site-header {
      padding: 56px 48px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 20px;
      justify-content: space-between;
    }

    .site-title {
      font-family: var(--font-disp);
      font-size: clamp(2.2rem, 4vw, 3.2rem);
      font-weight: 300;
      letter-spacing: -.02em;
      color: var(--ink);
      text-decoration: none;
    }

    .site-subtitle {
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }


    .home-link {
      font-size: .8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      font-weight: bold;
      transition: color .25s;
      margin-left: auto;
    }

    .home-link:hover { color: var(--ink); }

    /* ── Main ────────────────────────────────────────────────────────────────── */
    main {
      padding: 48px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Section label ───────────────────────────────────────────────────────── */
    .section-label {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Grid ────────────────────────────────────────────────────────────────── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--col), 1fr));
      gap: var(--gap);
    }

    /* ── Album card ──────────────────────────────────────────────────────────── */
    .album-card {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .55s var(--ease), transform .55s var(--ease);
    }

    .album-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .album-card__thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--border);
    }

    .album-card__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .6s var(--ease), filter .6s var(--ease);
      filter: brightness(.98) saturate(.9);
    }

    .album-card:hover .album-card__thumb img {
      transform: scale(1.04);
      filter: brightness(1) saturate(1.05);
    }

    .album-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,.28) 100%);
      opacity: 0;
      transition: opacity .4s var(--ease);
    }

    .album-card:hover .album-card__overlay { opacity: 1; }

    .album-card__count {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: rgba(255,255,255,.88);
      color: var(--ink);
      padding: 4px 10px;
      border-radius: 2px;
      backdrop-filter: blur(4px);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity .3s, transform .3s;
    }

    .album-card:hover .album-card__count {
      opacity: 1;
      transform: translateY(0);
    }

    .album-card__meta {
      padding: 16px 2px 8px;
    }

    .album-card__title {
      font-family: var(--font-disp);
      font-size: 1.25rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .album-card__desc {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Loading / Error ─────────────────────────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-family: var(--font-disp);
      font-size: 1.4rem;
      font-style: italic;
    }

    .state-msg.error { color: #c0392b; font-style: normal; font-size: 1rem; }

    /* ── Responsive ──────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .site-header { padding: 32px 20px 24px; flex-direction: column; gap: 6px; }
      main { padding: 32px 20px; }
      :root { --col: 150px; --gap: 12px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-title"><script>document.write(GalleryTitle);</script></a>
    <span class="site-subtitle">Albums</span>
    <a href="../" class="home-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back
    </a>
  </header>

  <main>
    <p class="section-label" id="album-count"></p>
    <div class="album-grid" id="grid">
      <div class="state-msg" id="loading">Loading…</div>
    </div>
  </main>

  <script>
    const API = 'api.php';

    async function load() {
      const grid = document.getElementById('grid');
      const countEl = document.getElementById('album-count');

      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const albums = data.albums || [];

        grid.innerHTML = '';

        if (!albums.length) {
          grid.innerHTML = '<div class="state-msg">No albums found.</div>';
          return;
        }

        countEl.textContent = `${albums.length} album${albums.length !== 1 ? 's' : ''}`;

        albums.forEach((album, i) => {
          const a = document.createElement('a');
          a.className = 'album-card';
          a.href = `album.html?album=${encodeURIComponent(album.slug)}`;
          a.style.transitionDelay = `${i * 55}ms`;
          a.innerHTML = `
            <div class="album-card__thumb">
              <img src="${album.cover}" alt="${esc(album.title)}" loading="lazy" />
              <div class="album-card__overlay"></div>
              <span class="album-card__count">${album.count} photo${album.count !== 1 ? 's' : ''}</span>
            </div>
            <div class="album-card__meta">
              <div class="album-card__title">${esc(album.title)}</div>
              ${album.description ? `<div class="album-card__desc">${esc(album.description)}</div>` : ''}
            </div>
          `;
          grid.appendChild(a);

          // Staggered reveal via IntersectionObserver
          requestAnimationFrame(() => {
            observer.observe(a);
          });
        });

      } catch (err) {
        grid.innerHTML = `<div class="state-msg error">Could not load albums.<br><small>${err.message}</small></div>`;
      }
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.05 });

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
  </script>

</body>
</html>
